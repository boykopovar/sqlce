name: Pages Wasm Demo

on:
  workflow_call:
  push:
    branches:
      - main
#    paths:
#      - 'demo/**'
#      - 'bindings/wasm/**'
#      - 'core/**'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: latest

      - name: Configure (Emscripten + CMake)
        run: emcmake cmake -B build-wasm -DSQLCE_BUILD_WASM=ON -DCMAKE_BUILD_TYPE=Release

      - name: Build sqlce_wasm
        run: cmake --build build-wasm --target sqlce_wasm --parallel

      - name: Assemble demo site
        run: |
          mkdir -p site/src/native
          cp demo/web/index.html demo/web/app.css demo/web/i18n.js site/
          cp -r demo/web/i18n site/i18n
          cp -r demo/web/src/. site/src/
          touch site/.nojekyll
          echo "site/ is ready:"
          ls -la site
          ls -la site/src
          ls -la site/src/native

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
