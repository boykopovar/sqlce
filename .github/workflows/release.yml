name: Build and release

on:
  push:
    tags:
      - "v*"
jobs:
  test:
    name: Run tests
    uses: ./.github/workflows/test.yml

  build-linux:
    name: Build wheel (Linux)
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache ccache (Linux wheel)
        uses: actions/cache@v4
        with:
          path: ~/.cache/ccache
          key: ccache-wheel-linux-${{ github.sha }}
          restore-keys: ccache-wheel-linux-

      - name: Build wheels
        uses: pypa/cibuildwheel@v2.21.3
        env:
          CIBW_ARCHS_LINUX: x86_64
          CIBW_BUILD_VERBOSITY: 1
          CIBW_ENVIRONMENT_LINUX: >-
            CMAKE_CXX_COMPILER_LAUNCHER=ccache
            CMAKE_C_COMPILER_LAUNCHER=ccache
          CIBW_BEFORE_ALL_LINUX: (yum install -y ccache || apt-get install -y ccache || apk add ccache) 2>/dev/null || true
          CIBW_CONTAINER_ENGINE: "docker; create_args: -v ${HOME}/.cache/ccache:/root/.cache/ccache"

      - name: Build sdist
        run: |
          python -m pip install --upgrade pip build
          python -m build --sdist

      - name: Collect wheels and sdist into one flat folder
        run: |
          mkdir -p collected
          cp wheelhouse/*.whl collected/
          cp dist/*.tar.gz collected/

      - uses: actions/upload-artifact@v4
        with:
          name: dist-linux
          path: collected/*

  build-windows:
    name: Build wheel (Windows)
    needs: test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build wheels
        uses: pypa/cibuildwheel@v2.21.3
        env:
          CIBW_ARCHS_WINDOWS: AMD64
          CIBW_BUILD_VERBOSITY: 1
          CIBW_CMAKE_ARGS: "-DSQLCE_BUILD_PYTHON_BINDINGS=ON"

      - uses: actions/upload-artifact@v4
        with:
          name: dist-windows
          path: wheelhouse/*

  build-cpp-linux:
    name: Build C++ library (Linux)
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install ccache
        run: sudo apt-get update && sudo apt-get install -y ccache

      - name: Cache ccache (Linux libsqlce)
        uses: actions/cache@v4
        with:
          path: ~/.cache/ccache
          key: ccache-libsqlce-linux-${{ github.sha }}
          restore-keys: ccache-libsqlce-linux-

      - name: Configure and build (static + shared)
        run: |
          version="${GITHUB_REF_NAME#v}"

          for link in static shared; do
            shared_flag=OFF
            if [ "$link" = "shared" ]; then shared_flag=ON; fi

            cmake -S . -B "build-$link" \
              -DCMAKE_BUILD_TYPE=Release \
              -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
              -DBUILD_SHARED_LIBS=$shared_flag

            cmake --build "build-$link" --target libsqlce -j

            pkg="libsqlce-${version}-linux-x86_64-${link}"
            mkdir -p "$pkg/lib" "$pkg/include"
            cp "build-$link/dist/lib/libsqlce".* "$pkg/lib/"
            cp -r core/include/. "$pkg/include/"
            tar -czf "${pkg}.tar.gz" "$pkg"
          done

      - uses: actions/upload-artifact@v4
        with:
          name: cpp-linux
          path: libsqlce-*.tar.gz

  build-cpp-windows:
    name: Build C++ library (Windows)
    needs: test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure and build (static + shared)
        shell: pwsh
        run: |
          $version = "${env:GITHUB_REF_NAME}" -replace '^v', ''

          foreach ($link in @("static", "shared")) {
            $sharedFlag = if ($link -eq "shared") { "ON" } else { "OFF" }

            cmake -S . -B "build-$link" -DCMAKE_BUILD_TYPE=Release -DBUILD_SHARED_LIBS=$sharedFlag
            cmake --build "build-$link" --target libsqlce --config Release -j

            $pkg = "libsqlce-$version-windows-x86_64-$link"
            New-Item -ItemType Directory -Force -Path "$pkg/lib" | Out-Null
            New-Item -ItemType Directory -Force -Path "$pkg/include" | Out-Null
            Copy-Item "build-$link/dist/lib/libsqlce.*" "$pkg/lib/"
            Copy-Item -Recurse "core/include/*" "$pkg/include/"
            Compress-Archive -Path $pkg -DestinationPath "$pkg.zip"
          }

      - uses: actions/upload-artifact@v4
        with:
          name: cpp-windows
          path: libsqlce-*.zip

  pages:
    name: Pages WASM Demo
    needs: test
    uses: ./.github/workflows/pages.yml
    permissions:
      contents: read
      pages: write
      id-token: write

  publish:
    name: Publish to PyPI
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: dist-*
          path: dist
          merge-multiple: true

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist

  publish-release:
    name: Publish GitHub Release
    needs: [build-cpp-linux, build-cpp-windows, build-linux, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: cpp-*
          path: release-assets
          merge-multiple: true

      - uses: actions/download-artifact@v4
        with:
          pattern: dist-*
          path: release-assets
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          generate_release_notes: true
